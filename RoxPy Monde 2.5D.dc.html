<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;overflow:hidden;background:#0a1020;font-family:'Poppins',system-ui,sans-serif}
a{color:#F6B73C}a:hover{color:#FF7A00}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes nodeGlow{0%,100%{box-shadow:inset 0 0 0 0.42vh #F6B73C,inset 0 0 0 0.62vh rgba(255,255,255,.35),0 0 0 0 rgba(246,183,60,.6),0 0 18px rgba(246,183,60,.6)}50%{box-shadow:inset 0 0 0 0.42vh #F6B73C,inset 0 0 0 0.62vh rgba(255,255,255,.35),0 0 0 10px rgba(246,183,60,0),0 0 30px rgba(246,183,60,.9)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</helmet>

<div data-screen-label="Monde 2.5D" style="position:fixed;inset:0;overflow:hidden;background:#0a1020">

  <!-- couche parallaxe arrière (floue, plus lente) -->
  <div ref="{{backRef}}" style="position:absolute;top:-4vh;left:0;height:108vh;display:flex;filter:blur(5px) brightness(.82);will-change:transform">
    <img src="assets/maps/forest.png" alt="" style="height:108vh;flex:none"></img>
    <img src="assets/maps/snow-mountain.png" alt="" style="height:108vh;flex:none"></img>
    <img src="assets/maps/lunar-temple.png" alt="" style="height:108vh;flex:none"></img>
    <img src="assets/maps/village.png" alt="" style="height:108vh;flex:none"></img>
    <img src="assets/maps/sanctuaire.png" alt="" style="height:108vh;flex:none"></img>
  </div>

  <!-- couche principale nette -->
  <div ref="{{mainRef}}" style="position:absolute;top:0;left:0;height:100vh;will-change:transform">
    <div style="display:flex;height:100vh">
      <img src="assets/maps/forest.png" alt="Forêt enchantée" style="height:100vh;flex:none"></img>
      <img src="assets/maps/snow-mountain.png" alt="Montagne enneigée" style="height:100vh;flex:none"></img>
      <img src="assets/maps/lunar-temple.png" alt="Temple lunaire" style="height:100vh;flex:none"></img>
      <img src="assets/maps/village.png" alt="Village forestier" style="height:100vh;flex:none"></img>
      <img src="assets/maps/sanctuaire.png" alt="Sanctuaire RoxPy" style="height:100vh;flex:none"></img>
    </div>

    <!-- fondu (vignette + brume) entre chaque paire de mondes -->
    <div style="position:absolute;top:0;left:177.68vh;width:34vh;height:100vh;pointer-events:none;z-index:2;background:linear-gradient(90deg, transparent, rgba(150,180,220,.5) 45%, rgba(150,180,220,.5) 55%, transparent);backdrop-filter:blur(2.5px);transform:translateX(-17vh)"></div>
    <div style="position:absolute;top:0;left:355.36vh;width:34vh;height:100vh;pointer-events:none;z-index:2;background:linear-gradient(90deg, transparent, rgba(150,140,210,.5) 45%, rgba(150,140,210,.5) 55%, transparent);backdrop-filter:blur(2.5px);transform:translateX(-17vh)"></div>
    <div style="position:absolute;top:0;left:533.04vh;width:34vh;height:100vh;pointer-events:none;z-index:2;background:linear-gradient(90deg, transparent, rgba(210,180,130,.5) 45%, rgba(210,180,130,.5) 55%, transparent);backdrop-filter:blur(2.5px);transform:translateX(-17vh)"></div>
    <div style="position:absolute;top:0;left:710.72vh;width:34vh;height:100vh;pointer-events:none;z-index:2;background:linear-gradient(90deg, transparent, rgba(170,120,220,.5) 45%, rgba(170,120,220,.5) 55%, transparent);backdrop-filter:blur(2.5px);transform:translateX(-17vh)"></div>

    <!-- hotspots cliquables sur les nodes du décor -->
    <sc-for list="{{nodeSpots}}" as="n" hint-placeholder-count="0">
      <button onClick="{{n.onClick}}" title="{{n.title}}" style="{{n.style}}" style-hover="{{n.hoverStyle}}">{{n.label}}</button>
    </sc-for>

    <!-- ta position : le renard, sur la zone en cours (adapté au stade) -->
    <img ref="{{heroRef}}" alt="Ton renard" style="{{heroStyle}}"></img>


  </div>

  <!-- brume de profondeur + vignette -->
  <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 42%, transparent 52%, rgba(6,10,22,.55) 100%)"></div>
  <div ref="{{fogRef}}" style="position:absolute;left:0;right:0;bottom:0;height:26vh;pointer-events:none;background:linear-gradient(180deg, transparent, rgba(140,170,220,.18) 55%, rgba(120,150,205,.32))"></div>

  <!-- particules -->
  <canvas ref="{{fxRef}}" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"></canvas>

  <!-- HUD -->
  <div style="position:absolute;top:14px;left:16px;right:16px;display:flex;align-items:center;gap:10px;pointer-events:none;z-index:20">
    <div style="display:flex;align-items:center;gap:10px;background:rgba(10,16,32,.82);border:1px solid rgba(246,183,60,.35);border-radius:99px;padding:8px 16px 8px 10px;box-shadow:0 2px 12px rgba(0,0,0,.4);pointer-events:auto">
      <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid #FF7A00"><img src="assets/fox1.png" alt="RoxPy" style="width:100%;height:100%;object-fit:cover;object-position:50% 12%"></div>
      <span style="font-family:'Baloo 2',cursive;font-weight:800;font-size:16px;color:#fff">RoxPy · Monde vivant</span>
    </div>
    <div style="position:relative;pointer-events:auto;display:flex;flex-direction:column;align-items:flex-start">
      <button onClick="{{onDdToggle}}" style="display:flex;align-items:center;gap:10px;background:rgba(10,16,32,.88);border:1px solid rgba(246,183,60,.5);color:#f2e8d5;border-radius:99px;padding:9px 16px;font-size:12.5px;font-weight:800;font-family:'Poppins',system-ui,sans-serif;cursor:pointer;white-space:nowrap" style-hover="filter:brightness(1.2)">
        <span>{{ddLabel}}</span>
        <span style="color:#F6B73C;font-size:10px">▼</span>
      </button>
      <sc-if value="{{ddOpen}}" hint-placeholder-val="{{false}}">
        <div style="position:absolute;top:calc(100% + 8px);left:0;display:flex;flex-direction:column;background:rgba(10,16,32,.95);border:1px solid rgba(246,183,60,.4);border-radius:16px;padding:6px;box-shadow:0 10px 30px rgba(0,0,0,.55);animation:popIn .15s ease;min-width:230px">
          <sc-for list="{{regionOpts}}" as="o" hint-placeholder-count="5">
            <button onClick="{{o.onClick}}" style="{{o.style}}" style-hover="background:rgba(246,183,60,.15)">{{o.label}}</button>
          </sc-for>
        </div>
      </sc-if>
    </div>
    <div style="flex:1"></div>
    <a href="RoxPy Carte du Monde.dc.html" style="pointer-events:auto;text-decoration:none;background:rgba(10,16,32,.82);border:1px solid rgba(246,183,60,.35);color:#f2e8d5;border-radius:99px;padding:10px 18px;font-size:13px;font-weight:800;white-space:nowrap">🗺️ Carte du monde</a>
    <a href="RoxPy.dc.html" style="pointer-events:auto;text-decoration:none;background:linear-gradient(135deg,#FF7A00,#F6B73C);color:#1a130b;border-radius:99px;padding:10px 18px;font-size:13px;font-weight:900;white-space:nowrap">← Retour au jeu</a>
  </div>

  <!-- invite de zone -->
  <sc-if value="{{promptOn}}" hint-placeholder-val="{{false}}">
    <div style="position:absolute;left:50%;bottom:11vh;transform:translateX(-50%);background:rgba(10,16,32,.9);border:2px solid #F6B73C;border-radius:99px;padding:12px 24px;font-size:14.5px;font-weight:800;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:popIn .25s ease;white-space:nowrap;z-index:20">{{promptText}}</div>
  </sc-if>

  <!-- détail d'une zone sélectionnée -->
  <sc-if value="{{selOn}}" hint-placeholder-val="{{false}}">
    <div style="position:absolute;inset:0;display:grid;place-items:center;background:rgba(6,10,20,.55);backdrop-filter:blur(3px);z-index:30" onClick="{{onSelClose}}">
      <div style="width:320px;background:linear-gradient(180deg,#141d33,#0d1424);border:1px solid rgba(246,183,60,.4);border-radius:20px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.55);animation:popIn .22s ease;text-align:center" onClick="{{selStop}}">
        <div style="font-family:'Baloo 2',cursive;font-weight:800;font-size:21px;color:#fff;margin-bottom:6px">{{selTitle}}</div>
        <div style="font-size:12.5px;font-weight:700;color:#9fb0c8;margin-bottom:14px">{{selSub}}</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button onClick="{{onSelClose}}" style="padding:11px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#c9d4e4;font-size:13px;font-weight:800;cursor:pointer" style-hover="background:rgba(255,255,255,.08)">Fermer</button>
          <a href="{{selPlayHref}}" style="text-decoration:none;padding:11px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF7A00,#F6B73C);color:#1a130b;font-size:13px;font-weight:900;box-shadow:0 4px 16px rgba(255,122,0,.4)" style-hover="filter:brightness(1.1)">▶ Jouer cette zone</a>
        </div>
      </div>
    </div>
  </sc-if>

  <!-- toast -->
  <sc-if value="{{toastOn}}" hint-placeholder-val="{{false}}">
    <div style="position:absolute;left:50%;top:84px;transform:translateX(-50%);background:rgba(10,16,32,.94);border:1px solid rgba(246,183,60,.45);color:#f2e8d5;border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;box-shadow:0 8px 26px rgba(0,0,0,.5);animation:fadeUp .3s ease;max-width:80vw;text-align:center;z-index:22">{{toastText}}</div>
  </sc-if>


  <!-- contrôles -->
  <div style="position:absolute;left:50%;bottom:16px;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center;pointer-events:none;z-index:20">
    <span style="background:rgba(10,16,32,.78);color:#dce3ea;border-radius:99px;padding:8px 15px;font-size:12px;font-weight:800;white-space:nowrap">🕹 ← → pour avancer sur le chemin</span>
    <span style="background:rgba(10,16,32,.78);color:#dce3ea;border-radius:99px;padding:8px 15px;font-size:12px;font-weight:800;white-space:nowrap">⏎ Entrée : zone proche</span>
    <span style="background:rgba(10,16,32,.78);color:#dce3ea;border-radius:99px;padding:8px 15px;font-size:12px;font-weight:800;white-space:nowrap">🖱 Glisser la carte, ou toucher gauche / droite</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: null}">
class Component extends DCLogic {
  state = { prompt: '', toast: '', region: '', sel: null, ddOpen: false };

  // largeur d'une image en vh (1672/941)
  IW = 177.68;

  // nodes en % de chaque image (mêmes positions que la Carte du Monde)
  regions() {
    return [
      { key: 'foret', nom: 'Forêt enchantée', icone: '✨', fx: 'fireflies',
        nodes: [[1, 22.1, 53.3], [2, 36.4, 62], [3, 53.7, 61.2], [4, 68.3, 61.3], [5, 75.2, 47.9], [6, 82.2, 37.3], [7, 88.4, 26.4]] },
      { key: 'montagne', nom: 'Montagne enneigée', icone: '🏔️', fx: 'snow',
        nodes: [[8, 12.4, 37.6], [9, 25.0, 44.3], [10, 33.2, 55.2], [11, 40.5, 47.5], [12, 52.9, 43.1], [13, 66.6, 50.1], [14, 79.6, 57.6], [15, 89.1, 66.5]] },
      { key: 'temple', nom: 'Temple lunaire', icone: '🌙', fx: 'stars',
        nodes: [[16, 19, 55.3], [17, 31.8, 69.0], [18, 50.3, 72.2], [19, 60.2, 58.7], [20, 78.7, 50.3], [21, 87.5, 62.0], [22, 92.5, 75.0]] },
      { key: 'village', nom: 'Village forestier', icone: '🏘️', fx: 'fireflies',
        nodes: [[23, 12, 52], [24, 25, 65], [25, 41.4, 59.8, 12.5], [26, 52, 46], [27, 61.9, 52.3, 12.5], [28, 76, 61]] },
      { key: 'sanctuaire', nom: 'Sanctuaire RoxPy', icone: '🔮', fx: 'stars',
        nodes: [[29, 8, 64], [30, 18, 52], [31, 28, 66], [32, 38, 52], [33, 47, 68], [34, 55, 48], [35, 62.4, 56.9, 11]] },
    ];
  }
  // polyline du chemin en vh : [x, y]
  pathPts() {
    const pts = [];
    this.regions().forEach((r, ri) => {
      for (const [, nx, ny] of r.nodes) pts.push([(ri + nx / 100) * this.IW, ny]);
    });
    return pts;
  }

  componentDidMount() {
    this.keys = {};
    this.pts = this.pathPts();
    // longueurs cumulées
    this.segs = [0];
    for (let i = 1; i < this.pts.length; i++) {
      const dx = this.pts[i][0] - this.pts[i - 1][0], dy = this.pts[i][1] - this.pts[i - 1][1];
      this.segs.push(this.segs[i - 1] + Math.hypot(dx, dy));
    }
    this.total = this.segs[this.segs.length - 1];
    let s = this.total * 0.08;
    try { const p = JSON.parse(localStorage.getItem('roxpy25d_s')); if (typeof p === 'number') s = Math.max(0, Math.min(this.total, p)); } catch (e) {}
    this.s = s;
    this.face = 1;
    this.frame = 0;
    this.frameT = 0;
    this.moving = false;
    this.camX = null;
    this._save = (() => { try { return JSON.parse(localStorage.getItem('roxpy_v1')) || {}; } catch (e) { return {}; } })();
    const stage = Math.max(0, Math.min(2, this._save.stage || 0));
    this.dir = ['renardeau', 'renard', 'argente'][stage];
    this.walkAnim = this.dir === 'renard' ? 'course' : 'marche';
    this.counts = { renardeau: { idle: 6, marche: 6 }, renard: { idle: 5, course: 6 }, argente: { idle: 6, marche: 6 } }[this.dir];
    this.walkRight = this.dir !== 'renardeau';
    if (window.top === window) {
      const noop = () => {};
      for (const k of ['__dcUpdate', '__dcSetProps', '__dcBoot']) {
        try { Object.defineProperty(window, k, { value: noop, writable: false, configurable: false }); } catch (e) {}
      }
    }
    this._kd = (e) => this.onKey(e, true);
    this._ku = (e) => this.onKey(e, false);
    window.addEventListener('keydown', this._kd);
    window.addEventListener('keyup', this._ku);
    this._pd = (e) => {
      if (e.target && e.target.closest && e.target.closest('button, a')) return;
      this._dragX = e.clientX; this._dragS = this.s; this._dragging = false;
      this.touch = e.clientX < innerWidth / 2 ? -1 : 1;
    };
    this._pm = (e) => {
      if (this._dragX == null) return;
      const dx = e.clientX - this._dragX;
      if (Math.abs(dx) > 6) this._dragging = true;
      if (this._dragging) {
        this.touch = 0;
        const vh = innerHeight / 100;
        this.s = Math.max(0, Math.min(this.total, this._dragS - dx / vh));
      }
    };
    this._pu = () => { this.touch = 0; this._dragX = null; this._dragging = false; };
    window.addEventListener('pointerdown', this._pd);
    window.addEventListener('pointermove', this._pm);
    window.addEventListener('pointerup', this._pu);
    window.addEventListener('pointercancel', this._pu);
    this.ps = null;
    this._last = performance.now();
    this._raf = requestAnimationFrame((t) => this.loop(t));
  }
  componentWillUnmount() {
    window.removeEventListener('keydown', this._kd);
    window.removeEventListener('keyup', this._ku);
    window.removeEventListener('pointerdown', this._pd);
    window.removeEventListener('pointermove', this._pm);
    window.removeEventListener('pointerup', this._pu);
    window.removeEventListener('pointercancel', this._pu);
    cancelAnimationFrame(this._raf);
  }
  onKey(e, down) {
    const k = (e.key || '').toLowerCase();
    if (k === 'arrowright' || k === 'd') { this.keys.r = down; e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'q' || k === 'a') { this.keys.l = down; e.preventDefault(); }
    else if (k === 'shift') this.keys.run = down;
    else if (down && (k === 'enter' || k === ' ' || k === 'e')) {
      e.preventDefault();
      const near = this.nearestNode();
      if (near) this.showToast('📖 ' + near.title + ' — retourne au jeu RoxPy pour la jouer et gagner son badge !');
      else this.showToast('🚶 Approche-toi d\u2019un panneau pour voir la zone.');
    }
  }
  // calcule le node le plus proche à la volée (indépendant de la boucle rAF)
  nearestNode() {
    const [fx, fy] = this.posAt(this.s);
    let best = null, nd = 1e9;
    this.regions().forEach((r) => {
      for (const [id, nx, ny] of r.nodes) {
        const X = (this.regions().indexOf(r) + nx / 100) * this.IW, Y = ny;
        const d = (X - fx) ** 2 + (Y - fy) ** 2;
        if (d < nd) { nd = d; best = { id, title: r.icone + ' Zone ' + id + ' · ' + r.nom }; }
      }
    });
    return nd < 9 * 9 ? best : null;
  }
  showToast(msg) {
    this.setState({ toast: msg });
    if (this._toastT) clearTimeout(this._toastT);
    this._toastT = setTimeout(() => this.setState({ toast: '' }), 3000);
  }

  // position (vh) le long du chemin
  posAt(s) {
    const S = this.segs, P = this.pts;
    let i = 1;
    while (i < S.length - 1 && S[i] < s) i++;
    const t = (s - S[i - 1]) / Math.max(0.001, S[i] - S[i - 1]);
    return [P[i - 1][0] + (P[i][0] - P[i - 1][0]) * t, P[i - 1][1] + (P[i][1] - P[i - 1][1]) * t, P[i][0] >= P[i - 1][0] ? 1 : -1];
  }

  loop(now) {
    this._raf = requestAnimationFrame((t) => this.loop(t));
    const dt = Math.min(0.05, (now - this._last) / 1000);
    this._last = now;
    const vh = innerHeight / 100;

    let dir = (this.keys.r ? 1 : 0) - (this.keys.l ? 1 : 0);
    if (!dir && this.touch) dir = this.touch;
    const run = this.keys.run ? 1.9 : 1;
    this.moving = !!dir;
    if (dir) {
      this.s = Math.max(0, Math.min(this.total, this.s + dir * 26 * run * dt));
      this._saveT = (this._saveT || 0) + dt;
      if (this._saveT > 1.5) { this._saveT = 0; try { localStorage.setItem('roxpy25d_s', JSON.stringify(Math.round(this.s * 10) / 10)); } catch (e) {} }
    }
    const [fx, fy, pathFace] = this.posAt(this.s);
    if (dir) this.face = dir;

    // caméra : centre la position sur le chemin, clamp aux bords du monde
    const worldW = 5 * this.IW * vh;
    const fxPx = fx * vh;
    let cam = fxPx - innerWidth * 0.44;
    cam = Math.max(0, Math.min(worldW - innerWidth, cam));
    if (this.camX == null) this.camX = cam;
    this.camX += (cam - this.camX) * Math.min(1, dt * 4);

    if (this._main) this._main.style.transform = 'translateX(' + (-this.camX) + 'px)';
    if (this._back) this._back.style.transform = 'translateX(' + (-this.camX * 0.86) + 'px) scale(1.04)';

    // région courante
    const ri = Math.max(0, Math.min(4, Math.floor(fx / this.IW)));
    const reg = this.regions()[ri];
    if (this.state.region !== reg.nom) this.setState({ region: reg.nom });

    // node proche (affichage de l'invite — la touche Entrée recalcule elle-même à la volée)
    const pz = this.nearestNode();
    if ((pz && pz.title) !== (this._near && this._near.title)) {
      this._near = pz;
      this.setState({ prompt: pz ? pz.title + '   —   ⏎ Détails' : '' });
    }

    // brume colorée par région
    if (this._fog) {
      const fogs = ['rgba(120,200,150,.26)', 'rgba(170,195,235,.34)', 'rgba(150,130,220,.3)', 'rgba(210,180,120,.26)', 'rgba(160,110,220,.32)'];
      this._fog.style.background = 'linear-gradient(180deg, transparent, ' + fogs[ri] + ')';
      this._fog.style.transition = 'background 1.2s ease';
    }

    this.fx(now, reg.fx);
  }

  // particules plein écran
  fx(t, mode) {
    const cv = this._cv;
    if (!cv) return;
    const w = cv.clientWidth, h = cv.clientHeight;
    if (!w) return;
    if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, w, h);
    if (this._fxMode !== mode || !this.ps) {
      this._fxMode = mode;
      const n = mode === 'snow' ? 140 : mode === 'stars' ? 120 : 90;
      this.ps = Array.from({ length: n }, () => ({ x: Math.random() * w, y: Math.random() * h, r: Math.random(), p: Math.random() * 7 }));
    }
    for (const p of this.ps) {
      if (mode === 'snow') {
        p.y += (0.3 + p.r * 0.8); p.x += Math.sin(t / 900 + p.p) * 0.5;
        if (p.y > h) { p.y = -4; p.x = Math.random() * w; }
        ctx.globalAlpha = 0.5 + p.r * 0.5;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 1 + p.r * 2.4, 0, 7); ctx.fill();
      } else if (mode === 'stars') {
        ctx.globalAlpha = 0.25 + Math.abs(Math.sin(t / 700 + p.p)) * 0.75;
        ctx.fillStyle = p.r > 0.6 ? '#c7b3ff' : '#9db8ff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 0.8 + p.r * 1.8, 0, 7); ctx.fill();
      } else {
        p.x += Math.sin(t / 1300 + p.p) * 0.4;
        p.y += Math.cos(t / 1600 + p.p * 2) * 0.35 - 0.08;
        if (p.y < -4) p.y = h + 4;
        if (p.x < -4) p.x = w + 4; if (p.x > w + 4) p.x = -4;
        ctx.globalAlpha = 0.2 + Math.abs(Math.sin(t / 800 + p.p)) * 0.8;
        ctx.fillStyle = p.r > 0.5 ? '#ffd97a' : '#8fe8b0';
        ctx.shadowColor = '#ffb84d'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(p.x, p.y, 1 + p.r * 1.7, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    ctx.globalAlpha = 1;
  }

  renderVals() {
    const save = (() => { try { return JSON.parse(localStorage.getItem('roxpy_v1')) || {}; } catch (e) { return {}; } })();
    const badges = save.badges || [1, 2, 3];
    const unlocked = Math.max(1, Math.min(35, save.unlocked || 4));
    const nodeSpots = [];
    let gi = 0;
    this.regions().forEach((r, ri) => {
      for (const [id, nx, ny, sz] of r.nodes) {
        const idx = gi++;
        const title = r.icone + ' Zone ' + id + ' · ' + r.nom;
        const st = badges.includes(id) ? 'done' : id === unlocked ? 'current' : id < unlocked ? 'done' : 'todo';
        const cols = { done: '#73C088', current: '#F6B73C', todo: '#5DADE2' };
        const bgs = {
          done: 'radial-gradient(circle at 35% 28%, rgba(255,255,255,.3), transparent 55%), linear-gradient(180deg, #3f7a50, #24512f)',
          current: 'radial-gradient(circle at 35% 28%, rgba(255,255,255,.35), transparent 55%), linear-gradient(180deg, #d99a2b, #8f5f14)',
          todo: 'radial-gradient(circle at 35% 28%, rgba(255,255,255,.25), transparent 55%), linear-gradient(180deg, #2b4a68, #16283c)',
        };
        nodeSpots.push({
          title,
          label: st === 'done' ? '✓' : String(id),
          onClick: () => {
            this.s = this.segs[idx];
            try { localStorage.setItem('roxpy25d_s', JSON.stringify(Math.round(this.s * 10) / 10)); } catch (e) {}
            const playable = badges.includes(id) || id <= unlocked;
            if (!playable) { this.showToast('🔒 Termine d\u2019abord la zone précédente pour débloquer celle-ci !'); return; }
            this.setState({ sel: { title, id, sub: id === unlocked ? '⭐ Ta position actuelle — à toi de jouer !' : '✅ Zone déjà réussie — badge gagné !' } });
          },
          style: {
            position: 'absolute',
            left: (ri + nx / 100) * this.IW + 'vh', top: ny + 'vh',
            transform: 'translate(-50%,-50%)',
            width: (sz || (st === 'current' ? 7 : 5.8)) + 'vh', height: (sz || (st === 'current' ? 7 : 5.8)) + 'vh', borderRadius: '50%',
            background: bgs[st], border: 'none', padding: 0,
            boxShadow: 'inset 0 0 0 0.42vh ' + cols[st] + ', inset 0 0 0 0.62vh rgba(255,255,255,.35), 0 0.5vh 1.4vh rgba(0,0,0,.5)',
            color: '#fff', fontWeight: 900, fontSize: sz ? sz * 0.42 + 'vh' : st === 'current' ? '3vh' : '2.4vh',
            fontFamily: "'Baloo 2', cursive", lineHeight: 1,
            display: 'grid', placeItems: 'center',
            textShadow: '0 1px 4px rgba(0,0,0,.6)',
            cursor: 'pointer', zIndex: 6,
            animation: st === 'current' ? 'nodeGlow 1.8s ease-in-out infinite' : 'none',
            transition: 'box-shadow .15s',
          },
          hoverStyle: { boxShadow: 'inset 0 0 0 0.42vh ' + cols[st] + ', 0 0 0 0.4vh rgba(255,255,255,.5), 0 0 3vh ' + cols[st] },
        });
      }
    });
    const curReg = this.regions().find((r) => (this.state.region || '') === r.nom);
    const regionOpts = this.regions().map((r, ri) => ({
      label: r.icone + ' ' + r.nom + (curReg === r ? '   ✓' : ''),
      onClick: () => {
        const firstIdx = this.regions().slice(0, ri).reduce((n, x) => n + x.nodes.length, 0);
        this.s = this.segs[firstIdx];
        try { localStorage.setItem('roxpy25d_s', JSON.stringify(Math.round(this.s * 10) / 10)); } catch (e2) {}
        this.setState({ ddOpen: false });
      },
      style: {
        display: 'flex', alignItems: 'center', gap: '8px',
        padding: '10px 14px', borderRadius: '11px', border: 'none',
        background: curReg === r ? 'rgba(246,183,60,.22)' : 'transparent',
        color: curReg === r ? '#F6B73C' : '#dce3ea',
        fontSize: '13px', fontWeight: 800, fontFamily: "'Poppins',system-ui,sans-serif",
        cursor: 'pointer', textAlign: 'left', whiteSpace: 'nowrap',
        transition: 'background .15s',
      },
    }));
    // coffres décoratifs (chiffres peints verrouillés dans le décor de la montagne)
    for (const [cx, cy] of [[51.7, 85.9], [71.9, 88.2]]) {
      nodeSpots.push({
        title: 'Coffre mystérieux',
        label: '🎁',
        onClick: () => this.showToast('🎁 Termine toutes les zones de la région pour ouvrir ce coffre !'),
        style: {
          position: 'absolute',
          left: (1 + cx / 100) * this.IW + 'vh', top: cy + 'vh',
          transform: 'translate(-50%,-50%)',
          width: '5.8vh', height: '5.8vh', borderRadius: '50%',
          background: 'radial-gradient(circle at 35% 28%, rgba(255,255,255,.18), transparent 55%), linear-gradient(180deg, #3a4257, #232a3c)',
          border: 'none', padding: 0,
          boxShadow: 'inset 0 0 0 0.42vh #6b7690, inset 0 0 0 0.62vh rgba(255,255,255,.25), 0 0.5vh 1.4vh rgba(0,0,0,.5)',
          fontSize: '2.6vh', lineHeight: 1,
          display: 'grid', placeItems: 'center',
          cursor: 'not-allowed', zIndex: 6,
        },
        hoverStyle: {},
      });
    }
    let curId = unlocked;
    for (let z = 1; z <= unlocked; z++) { if (!badges.includes(z)) { curId = z; break; } }
    let heroX = null, heroY = null;
    this.regions().forEach((r, ri) => {
      for (const [id, nx, ny] of r.nodes) { if (id === curId) { heroX = (ri + nx / 100) * this.IW; heroY = ny; } }
    });
    const hStage = Math.max(0, Math.min(2, save.stage || 0));
    const heroSrc = 'assets/sprites/' + ['renardeau', 'renard', 'argente'][hStage] + '/idle1.png';
    const heroStyle = heroX == null ? { display: 'none' } : {
      position: 'absolute', left: heroX + 'vh', top: (heroY - 1) + 'vh',
      height: '16vh', transform: 'translate(-50%,-100%)', zIndex: 8, pointerEvents: 'none',
      filter: 'drop-shadow(0 1vh 1.2vh rgba(0,0,0,.5)) drop-shadow(0 0 1.6vh rgba(246,183,60,.4))',
    };
    return {
      heroStyle,
      heroRef: (el) => { if (el && el.getAttribute('src') !== heroSrc) el.setAttribute('src', heroSrc); },
      regionOpts,
      ddLabel: curReg ? curReg.icone + ' ' + curReg.nom : '🌍 Choisir un monde',
      ddOpen: this.state.ddOpen,
      onDdToggle: () => this.setState({ ddOpen: !this.state.ddOpen }),
      nodeSpots,
      selOn: !!this.state.sel,
      selTitle: this.state.sel ? this.state.sel.title : '',
      selSub: this.state.sel ? this.state.sel.sub : '',
      onSelClose: () => this.setState({ sel: null }),
      selPlayHref: this.state.sel ? 'RoxPy.dc.html#zone-' + this.state.sel.id : 'RoxPy.dc.html',
      selStop: (e) => e.stopPropagation(),
      backRef: (el) => { this._back = el; },
      mainRef: (el) => { this._main = el; },
      fxRef: (el) => { this._cv = el; },
      fogRef: (el) => { this._fog = el; },
      promptOn: !!this.state.prompt,
      promptText: this.state.prompt,
      toastOn: !!this.state.toast,
      toastText: this.state.toast,
    };
  }
}
</script>
</body>
